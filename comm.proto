syntax = "proto3";
package comm;
option go_package = "github.com/kmrd-industries/qlp-proto-bindings/gen/go";

message Room {
    int32 x = 1;
    int32 y = 2;
}

message PositionUpdate {
    uint32 entity_id = 1;
    float x = 2;
    float y = 3;
    Room room = 4;
}

enum StateVariant {
    NONE = 0;
    CONNECTED = 1;
    DISCONNECTED = 2;
}

message StateUpdate {
    uint32 id = 1;
    StateVariant variant = 2;
}
